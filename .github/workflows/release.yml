name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK and App Bundle
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          BUILD_NUMBER=${{ github.run_number }}
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -di > android/app/elrs-upload.jks
          flutter build apk --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          flutter build appbundle --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          
          mv build/app/outputs/flutter-apk/app-release.apk "ELRS-Mobile-${{ github.ref_name }}.apk"
          mv build/app/outputs/bundle/release/app-release.aab "ELRS-Mobile-${{ github.ref_name }}.aab"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: io.datarx.elrsmobile
          releaseFiles: ELRS-Mobile-${{ github.ref_name }}.aab
          track: internal
          status: completed

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ELRS-Mobile-${{ github.ref_name }}.apk
            ELRS-Mobile-${{ github.ref_name }}.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Version Gist
        if: success()
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          GIST_FILE="version.json"
          
          # Create JSON content
          JSON_CONTENT=$(cat <<EOF
          {
            "version": "$VERSION",
            "url": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          }
          EOF
          )
          
          # Escaping for JSON string
          ESCAPED_CONTENT=$(echo "$JSON_CONTENT" | jq -aRs .)

          # Update Gist using GitHub API
          curl -sfSL \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GIST_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}" \
            -d "{\"files\":{\"$GIST_FILE\":{\"content\":$ESCAPED_CONTENT}}}"

  build-ios:
    name: Build & Distribute iOS
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install Apple Certificate and Provisioning Profile
        run: |
          # 1. Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 2. Import certificate
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > $RUNNER_TEMP/dist.p12
          security import $RUNNER_TEMP/dist.p12 -k $KEYCHAIN_PATH -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 3. Import provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision

      - name: Build IPA
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          BUILD_NUMBER=${{ github.run_number }}
          
          # Build IPA and export for App Store
          flutter build ipa --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

          mv build/ios/ipa/*.ipa "ELRS-Mobile-${{ github.ref_name }}.ipa"

      - name: Upload to App Store Connect
        run: |
          # Create API key file for xcrun
          mkdir -p ~/.appstoreconnect/private_keys
          printf "%s" "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          
          xcrun altool --upload-app \
            --type ios \
            --file "ELRS-Mobile-${{ github.ref_name }}.ipa" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

      - name: Upload iOS IPA to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ELRS-Mobile-${{ github.ref_name }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
